name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Swift Tests
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Available Xcodes
        run: ls /Applications/ | grep -i xcode

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.app/Contents/Developer

      - name: Swift version
        run: swift --version

      - name: Run tests
        run: swift test
